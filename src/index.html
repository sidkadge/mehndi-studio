<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gauries Mehndi Kala</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ── Loader Overlay ── */
    #gmk-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #gmk-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-ornament {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #FDC830;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 8px;
    }

    .loader-ornament::before,
    .loader-ornament::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(253, 200, 48, 0.35);
    }
    .loader-ornament::before { inset: 8px; }
    .loader-ornament::after  { inset: 16px; border-style: dashed; }

    .loader-ornament-inner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(253,200,48,0.4);
      box-shadow: 0 0 16px rgba(253,200,48,0.35);
    }

    .loader-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      color: #FDC830;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(253, 200, 48, 0.4);
      min-height: 1.2em;
      text-align: center;
    }

    .loader-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(11px, 2.5vw, 15px);
      letter-spacing: 10px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .loader-subtitle.show {
      opacity: 1;
      transform: translateY(0);
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #FDC830;
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .loader-bar-wrap {
      width: clamp(180px, 40vw, 300px);
      height: 2px;
      background: rgba(253,200,48,0.15);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 10px;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FDC830, #f59e0b);
      border-radius: 99px;
      transition: width 0.15s ease;
      box-shadow: 0 0 8px rgba(253,200,48,0.7);
    }

    /* ── Floating Social Sidebar ── */
    .social-float {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9000;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sf-btn {
      display: flex;
      align-items: center;
      width: 44px;
      height: 44px;
      overflow: hidden;
      text-decoration: none;
      color: #fff;
      border-radius: 0 8px 8px 0;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.35s ease,
                  opacity 0.3s ease;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      opacity: 0.85;
    }

    .sf-btn:hover {
      width: 140px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.4);
      opacity: 1;
    }

    .sf-btn i {
      min-width: 44px;
      text-align: center;
      font-size: 16px;
      line-height: 44px;
      flex-shrink: 0;
    }

    .sf-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 1.5px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.2s ease 0.15s,
                  transform 0.2s ease 0.15s;
      padding-right: 14px;
    }

    .sf-btn:hover .sf-label {
      opacity: 1;
      transform: translateX(0);
    }

    /* Brand colours */
    .sf-instagram {
      background: linear-gradient(160deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
    .sf-facebook  { background: #1877f2; }
    .sf-pinterest { background: #e60023; }
    .sf-whatsapp  { background: #25d366; }

    /* Hide on small screens */
    @media (max-width: 480px) {
      .social-float { display: none; }
    }
  </style>
</head>
<body>

  <!-- ══ LOADER ══ -->
  <div id="gmk-loader">
    <div class="loader-ornament">
      <img src="/logotwo.png" alt="Gauries Mehndi Kala" class="loader-ornament-inner" />
    </div>
    <div class="loader-title" id="loader-text"><span class="cursor"></span></div>
    <div class="loader-subtitle" id="loader-sub">Mehndi Kala Studio</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
  </div>

  <!-- ══ FLOATING SOCIAL SIDEBAR ══ -->
  <div class="social-float">
    <a href="#" class="sf-btn sf-instagram" aria-label="Instagram" target="_blank" rel="noopener">
      <i class="fab fa-instagram"></i>
      <span class="sf-label">Instagram</span>
    </a>
    <a href="#" class="sf-btn sf-facebook" aria-label="Facebook" target="_blank" rel="noopener">
      <i class="fab fa-facebook-f"></i>
      <span class="sf-label">Facebook</span>
    </a>
    <a href="#" class="sf-btn sf-pinterest" aria-label="Pinterest" target="_blank" rel="noopener">
      <i class="fab fa-pinterest-p"></i>
      <span class="sf-label">Pinterest</span>
    </a>
    <a href="https://wa.me/917588525387" class="sf-btn sf-whatsapp" aria-label="WhatsApp" target="_blank" rel="noopener">
      <i class="fab fa-whatsapp"></i>
      <span class="sf-label">WhatsApp</span>
    </a>
  </div>

  <!-- ══ ANGULAR APP ══ -->
  <app-root></app-root>

  <script>
    (function () {
      const fullText   = 'Gauries';
      const textEl     = document.getElementById('loader-text');
      const subEl      = document.getElementById('loader-sub');
      const barEl      = document.getElementById('loader-bar');
      const loaderEl   = document.getElementById('gmk-loader');
      const typingSpeed = 90;
      let   charIndex  = 0;

      function typeChar() {
        if (charIndex < fullText.length) {
          const cursor = textEl.querySelector('.cursor');
          const txt    = document.createTextNode(fullText[charIndex]);
          textEl.insertBefore(txt, cursor);
          charIndex++;
          barEl.style.width = (charIndex / fullText.length * 60) + '%';
          setTimeout(typeChar, typingSpeed);
        } else {
          subEl.classList.add('show');
          barEl.style.transition = 'width 0.6s ease';
          barEl.style.width = '100%';
          setTimeout(hideLoader, 900);
        }
      }

      function hideLoader() {
        loaderEl.classList.add('hide');
        setTimeout(() => loaderEl.remove(), 700);
      }

      setTimeout(typeChar, 400);
    })();
  </script>

</body>
</html>
